version: '3.8'

services:
  postgres:
    image: postgres:13.3
    container_name: postgres-wallet
    environment:
      POSTGRES_DB: "wallet_db"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: